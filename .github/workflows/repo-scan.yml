name: conlenz-repo-scan

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue overlapping pushes to main instead of cancelling them
concurrency:
  group: repo-scan-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # 1. Checkout THIS repo (the one being scanned) into ./repo
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: repo

      # 2. Checkout the conlenz scanner into ./conlenz
      - name: Checkout conlenz scanner
        uses: actions/checkout@v4
        with:
          repository: Abhinay9763/conlenz2
          ref: main
          path: conlenz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: conlenz/.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('conlenz/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv conlenz/.venv
          conlenz/.venv/bin/python -m pip install --upgrade pip
          conlenz/.venv/bin/pip install -r conlenz/requirements.txt

      - name: Run scan
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          RESEND_MAIL: ${{ secrets.RESEND_MAIL }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          cd conlenz
          .venv/bin/python -m app.cli_scan \
            --path ../repo \
            --mode deep \
            --recipient "$REPORT_RECIPIENT" \
            --out ../reports

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: conlenz-scan-reports
          path: reports/
          if-no-files-found: ignore
