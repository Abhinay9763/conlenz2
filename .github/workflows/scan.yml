name: Conlenz Audit Scan

on:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          RESEND_MAIL: ${{ secrets.RESEND_MAIL }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            python -m app.cli_scan --path . --mode deep --recipient "$REPORT_RECIPIENT" --out reports --changed-files ${{ steps.changed-files.outputs.all_changed_files }}
          else
            echo "No files changed."
            mkdir reports
          fi

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conlenz-reports
          path: reports
          if-no-files-found: ignore
