name: Conlenz Audit Scan

on:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same PR
concurrency:
  group: scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout THIS repo (the one being scanned) into ./repo
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: repo

      # 2. Checkout the conlenz scanner into ./conlenz
      - name: Checkout conlenz scanner
        uses: actions/checkout@v4
        with:
          repository: Abhinay9763/conlenz2
          ref: main
          path: conlenz
          token: ${{ secrets.CONLENZ_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: conlenz/.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('conlenz/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv conlenz/.venv
          conlenz/.venv/bin/python -m pip install --upgrade pip
          conlenz/.venv/bin/pip install -r conlenz/requirements.txt

      - name: Run scan
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          RESEND_MAIL: ${{ secrets.RESEND_MAIL }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          # Fallback: PR author's email (pusher email if available, else noreply)
          PUSHER_EMAIL: ${{ github.event.pusher.email || format('{0}@users.noreply.github.com', github.actor) }}
        run: |
          cd conlenz
          # Use secret if set, otherwise fall back to the PR author's email
          RECIPIENT="${REPORT_RECIPIENT:-$PUSHER_EMAIL}"
          .venv/bin/python -m app.cli_scan \
            --path ../repo \
            --mode deep \
            --recipient "$RECIPIENT" \
            --out ../reports

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conlenz-reports
          path: reports/
          if-no-files-found: ignore
